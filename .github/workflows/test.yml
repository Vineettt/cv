name: Test Self Hosted

on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Say Hello
        run: echo "Runner is working!"

      - name: Extend Duration for Watchdog
        run: |
          echo "Sleeping for 60 seconds to allow dashboard verification..."
          sleep 60
          echo "Verification window closed."

      - name: System Info
        run: |
          echo "Running on: $(hostname)"
          echo "User: $(whoami)"